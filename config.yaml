# ==============================================================================
# EXPERIMENTAL CONFIGURATION: SDSM-UAP PROACTIVE DEFENSE
# Architecture: Tri-Surrogate Ensemble (FaceNet, StarGAN, DDPM)
# Hardware Target: 4GB VRAM (Sequential Gradient Accumulation)
# ==============================================================================

# --- 1. Topographic Directory Mapping ---
paths:
  # Source Manifolds (Pristine Datasets)
  celeba_hq_source: "./data/raw/celeba_hq_256"
  ffhq_source:      "./data/raw/Flickr_Faces_HQ"
  lfw_source:       "./data/raw/Labelled_Faces_in_the_Wild"
  
  # Preprocessed Spatial Manifolds
  train_data_output: "./data/processed/train"
  test_data_output:  "./data/processed/test"
  
  # Optimization Checkpoints and Artifacts
  results_dir: "./results"
  models_dir:  "./models"
  
  # Local Surrogate Weights
  stargan_weights: "./stargan_celeba_256/200000-G.ckpt"

# --- 2. Data Pipeline Specifications ---
data:
  image_size: 256
  train_subset_size: 5000  # Total optimization manifold (CelebA-HQ + FFHQ)
  test_subset_size: 1000   # Zero-shot evaluation manifold (Aligned LFW)

# --- 3. Optimization Hyperparameters ---
training:
  # VRAM Optimization Constraints
  batch_size: 1            # Constrained to 1 to prevent CUDA Out-Of-Memory (OOM) exceptions
  epochs: 30               # Total optimization passes over the training manifold
  learning_rate: 0.005
  
  # Adversarial Constraints
  epsilon: 0.04            # L-infinity norm bound (strict magnitude clipping for visual stealth)
  
  # SDSM Disruption Weights (The Stealth-Robustness Trade-off)
  lambda_geom: 1.0         # Coefficient for the deep feature divergence (Angular + Spatial MSE)
  lambda_lpips: 5.0        # Perceptual penalty coefficient to enforce structural similarity
  
  # Algorithm Directives
  attack_strategy: "directional_feature_disruption" # Refers to the SDSM optimization logic
  steps: 50                # Default inference steps for auxiliary latent diffusion processes

# --- 4. Hardware & System Configuration ---
system:
  seed: 42                 # Ensures deterministic tensor initialization and reproducible manifolds
  num_workers: 0           # Enforced 0 for Windows OS memory paging compatibility